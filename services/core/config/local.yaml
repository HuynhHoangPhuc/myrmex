server:
  http_port: 8080
  grpc_port: 50051
  self_url: "http://localhost:8080"

database:
  url: "postgres://myrmex:myrmex_dev@localhost:5432/myrmex?sslmode=disable&search_path=core"

nats:
  url: "nats://localhost:4222"

jwt:
  secret: "myrmex-dev-secret-change-in-production"
  access_expiry: "15m"
  refresh_expiry: "168h"

log:
  level: "development"

notification:
  http_addr: "http://localhost:8056"

hr:
  grpc_addr: "localhost:50052"
subject:
  grpc_addr: "localhost:50053"
timetable:
  grpc_addr: "localhost:50054"
student:
  grpc_addr: "localhost:50055"

oauth:
  google:
    client_id: ""             # set via OAUTH_GOOGLE_CLIENT_ID env var
    client_secret: ""         # set via OAUTH_GOOGLE_CLIENT_SECRET env var
    redirect_url: "http://localhost:8080/api/auth/oauth/google/callback"
  microsoft:
    client_id: ""             # set via OAUTH_MICROSOFT_CLIENT_ID env var
    client_secret: ""         # set via OAUTH_MICROSOFT_CLIENT_SECRET env var
    tenant_id: ""             # set via OAUTH_MICROSOFT_TENANT_ID env var
    redirect_url: "http://localhost:8080/api/auth/oauth/microsoft/callback"
  frontend_callback_url: "http://localhost:3000/auth/callback"

llm:
  provider: "openai"          # "openai" or "claude"
  api_key: ""                 # set via LLM_API_KEY env var in production
  model: "gpt-4o-mini"        # use claude-haiku-4-5 for claude provider
  base_url: "https://api.openai.com/v1"  # override for Ollama: http://localhost:11434/v1


resend:
  api_key: ""                 # set via RESEND_API_KEY env var in production
  from_addr: "Myrmex <noreply@myrmex.edu.vn>"
